<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Enhancer - Renoodev</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen pb-12">

    <nav class="p-6 glass sticky top-0 z-50 mb-10 shadow-xl text-center">
        <h1 class="font-bold text-xl text-blue-400">Peningkat Gambar AI</h1>
    </nav>

    <div class="max-w-2xl mx-auto px-5">
        <!-- Kotak Error -->
        <div id="errorBox" class="hidden mb-6 p-4 bg-red-500/20 border border-red-500/50 rounded-xl text-red-200 text-sm">
            <p id="errorMessage"></p>
        </div>

        <div id="dropZone" class="glass rounded-3xl p-10 text-center border-2 border-dashed border-slate-700 cursor-pointer">
            <input type="file" id="fileInput" class="hidden" accept="image/*">
            <p class="text-slate-400">Klik untuk Upload Foto</p>
        </div>

        <div id="workspace" class="hidden mt-8 space-y-6">
            <div class="flex gap-4">
                <button id="btnCancel" class="flex-1 bg-slate-800 p-3 rounded-xl text-sm">Ganti Foto</button>
                <button id="btnEnhance" class="flex-[2] bg-blue-600 p-3 rounded-xl font-bold shadow-lg shadow-blue-600/30">Tingkatkan Sekarang</button>
            </div>

            <div class="space-y-4">
                <div class="glass p-4 rounded-2xl">
                    <p class="text-xs font-bold text-slate-500 mb-2 uppercase">Asli</p>
                    <img id="imgInput" class="w-full rounded-lg" src="">
                </div>
                <div class="glass p-4 rounded-2xl">
                    <p class="text-xs font-bold text-blue-500 mb-2 uppercase">Hasil AI</p>
                    <div id="loadingText" class="hidden text-center py-10 text-slate-500 animate-pulse">Sedang diproses AI...</div>
                    <img id="imgOutput" class="hidden w-full rounded-lg" src="">
                </div>
            </div>
        </div>
    </div>

    <script>
        // MASUKKAN API KEY ANDA DI SINI
        const apiKey = "AIzaSyAfFeLGurpz4T8dWbpDkG2r91Wd5tHAazs"; 

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const workspace = document.getElementById('workspace');
        const imgInput = document.getElementById('imgInput');
        const imgOutput = document.getElementById('imgOutput');
        const btnEnhance = document.getElementById('btnEnhance');
        const errorBox = document.getElementById('errorBox');
        const errorMessage = document.getElementById('errorMessage');
        const loadingText = document.getElementById('loadingText');

        let base64Image = "";
        let mimeType = "";

        dropZone.onclick = () => fileInput.click();
        fileInput.onchange = e => {
            const file = e.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = e => {
                imgInput.src = e.target.result;
                base64Image = e.target.result.split(',')[1];
                mimeType = file.type;
                dropZone.classList.add('hidden');
                workspace.classList.remove('hidden');
                imgOutput.classList.add('hidden');
            };
            reader.readAsDataURL(file);
        };

        btnEnhance.onclick = async () => {
            if(!apiKey) {
                alert("API Key Kosong! Edit kode di GitHub dulu.");
                return;
            }

            loadingText.classList.remove('hidden');
            imgOutput.classList.add('hidden');
            errorBox.classList.add('hidden');

            try {
                // Menggunakan model 1.5-flash yang lebih stabil
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                {text: "Tingkatkan kualitas gambar ini agar lebih tajam, jernih, dan cerah. Berikan hasil akhirnya saja."},
                                {inlineData: {mimeType: mimeType, data: base64Image}}
                            ]
                        }],
                        generationConfig: { responseModalities: ["IMAGE"] }
                    })
                });

                const data = await response.json();
                
                if (data.error) throw new Error(data.error.message);

                const outPart = data.candidates?.[0]?.content?.parts?.find(p => p.inlineData);
                if(outPart) {
                    imgOutput.src = `data:${outPart.inlineData.mimeType};base64,${outPart.inlineData.data}`;
                    imgOutput.classList.remove('hidden');
                } else {
                    throw new Error("AI tidak memberikan gambar. Coba ganti foto lain.");
                }
            } catch (err) {
                errorBox.classList.remove('hidden');
                errorMessage.innerText = "Error: " + err.message;
            } finally {
                loadingText.classList.add('hidden');
            }
        };

        document.getElementById('btnCancel').onclick = () => location.reload();
    </script>
</body>
</html>
